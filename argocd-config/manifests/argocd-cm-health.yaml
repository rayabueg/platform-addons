# Custom ArgoCD health check for Gateway resources.
# The default check requires Programmed=True, which needs an EXTERNAL-IP from a
# cloud LoadBalancer. In this bare-metal/VM lab there is no LB controller, so
# EXTERNAL-IP stays <pending> and Programmed stays False — blocking ArgoCD forever.
#
# This override marks a Gateway Healthy as soon as Accepted=True (meaning Envoy
# Gateway has accepted and configured the Gateway), which is sufficient for the lab.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  resource.customizations.health.gateway.networking.k8s.io_Gateway: |
    hs = {}
    if obj.status ~= nil then
      for i, condition in ipairs(obj.status.conditions or {}) do
        if condition.type == "Accepted" and condition.status == "True" then
          hs.status = "Healthy"
          hs.message = condition.message
          return hs
        end
      end
    end
    hs.status = "Progressing"
    hs.message = "Gateway not yet accepted by Envoy Gateway"
    return hs
