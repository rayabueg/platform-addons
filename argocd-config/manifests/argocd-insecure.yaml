# Patch argocd-cmd-params-cm to enable insecure (HTTP) mode.
# This allows the ArgoCD UI to be served over plain HTTP so it can be
# routed through the Envoy Gateway HTTPRoute without TLS complications.
#
# Routing: localhost:9080 → EG argocd listener (9080) → HTTPRoute → argocd-server svc:80 → pod:8080
# Note: the HTTPRoute backendRef targets the Service port (80), not the Gateway listener port (9080).
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  server.insecure: "true"
